version: 2

project_name: marmot

before:
  hooks:
    - go mod tidy

builds:
  - id: marmot
    main: ./cmd/marmot
    binary: marmot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    hooks:
      post:
        # Sign darwin binaries with Developer ID cert (or ad-hoc fallback).
        # The release workflow sets APPLE_SIGNING_IDENTITY after importing the cert.
        - cmd: >-
            {{ if eq .Os "darwin" }}./scripts/sign-darwin.sh "{{ .Path }}"{{ else }}true{{ end }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
      - goos: darwin
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: nurozen
    name: context-marmot
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Installation

    **macOS** (signed and notarized):
    ```bash
    tar xzf marmot_*.zip  # or unzip
    chmod +x marmot
    sudo mv marmot /usr/local/bin/
    ```

    **Linux:**
    ```bash
    tar xzf marmot_*.tar.gz
    chmod +x marmot
    sudo mv marmot /usr/local/bin/
    ```
