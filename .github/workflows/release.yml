name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npx vite build

      # --- Apple Signing Setup ---
      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add keychain to search list and allow codesign access
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Find the signing identity and export for GoReleaser
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')

          if [ -n "$IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
            echo "Found signing identity: $IDENTITY"
          else
            echo "::warning::No Developer ID Application identity found in certificate"
          fi

      - name: Set up Apple notarization credentials
        if: env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "Notarization API key installed for key ID: $APPLE_API_KEY_ID"

      # --- Build & Release ---
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}

      # --- Notarize darwin binaries ---
      # Submit all archives in parallel (don't wait inline — Apple can be slow).
      # Then poll for all results with a shared timeout.
      - name: Notarize macOS binaries
        if: env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_API_KEY_ID != ''
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          KEY_PATH=~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          SUBMISSION_IDS=()

          # Phase 1: Submit all archives (no waiting).
          for archive in dist/marmot_*_darwin_*.zip; do
            [ -f "$archive" ] || continue
            echo "Submitting $archive..."
            OUTPUT=$(xcrun notarytool submit "$archive" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" 2>&1)
            echo "$OUTPUT"
            ID=$(echo "$OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
            if [ -n "$ID" ]; then
              SUBMISSION_IDS+=("$ID:$archive")
              echo "Submitted $archive → $ID"
            else
              echo "::warning::Failed to submit $archive"
            fi
          done

          if [ ${#SUBMISSION_IDS[@]} -eq 0 ]; then
            echo "No submissions to track."
            exit 0
          fi

          # Phase 2: Poll all submissions (up to 15 min total).
          DEADLINE=$((SECONDS + 900))
          PENDING=("${SUBMISSION_IDS[@]}")

          while [ ${#PENDING[@]} -gt 0 ] && [ $SECONDS -lt $DEADLINE ]; do
            sleep 30
            STILL_PENDING=()
            for entry in "${PENDING[@]}"; do
              ID="${entry%%:*}"
              ARCHIVE="${entry#*:}"
              STATUS=$(xcrun notarytool info "$ID" \
                --key "$KEY_PATH" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER_ID" 2>&1 | grep "status:" | head -1 | awk '{print $2}')
              case "$STATUS" in
                Accepted)
                  echo "✅ $ARCHIVE notarized ($ID)"
                  ;;
                Invalid|Rejected)
                  echo "::warning::$ARCHIVE notarization rejected ($ID)"
                  xcrun notarytool log "$ID" \
                    --key "$KEY_PATH" \
                    --key-id "$APPLE_API_KEY_ID" \
                    --issuer "$APPLE_API_ISSUER_ID" 2>&1 || true
                  ;;
                *)
                  STILL_PENDING+=("$entry")
                  echo "⏳ $ARCHIVE still processing ($STATUS)..."
                  ;;
              esac
            done
            PENDING=("${STILL_PENDING[@]}")
          done

          if [ ${#PENDING[@]} -gt 0 ]; then
            echo "::warning::Notarization still pending for ${#PENDING[@]} archive(s) after timeout. Apple will complete async — Gatekeeper checks online."
            for entry in "${PENDING[@]}"; do
              echo "  Pending: ${entry#*:} (${entry%%:*})"
            done
          fi

      # --- Cleanup ---
      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ~/private_keys
