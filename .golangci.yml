version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - (io.Closer).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: cmd/marmot-eval/
        linters:
          - errcheck
