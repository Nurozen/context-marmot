<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextMarmot — Graph Explorer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">&#x1F9AB; ContextMarmot</h1>
        <select id="namespace-select"></select>
        <button id="refresh-btn" title="Refresh graph">&#x21BB;</button>
      </div>
      <div class="toolbar-center">
        <input type="text" id="search-input" placeholder="Search nodes… (press /)" />
      </div>
      <div class="toolbar-right">
        <select id="groupby-select" title="Group nodes by">
          <option value="none">No grouping</option>
          <option value="type" selected>Group by type</option>
          <option value="tag">Group by tag</option>
          <option value="folder">Group by folder</option>
          <option value="namespace">Group by namespace</option>
        </select>
        <label class="toggle"><input type="checkbox" id="heat-toggle" /> Heat</label>
        <label class="toggle"><input type="checkbox" id="superseded-toggle" /> Superseded</label>
      </div>
    </header>
    <div id="main-area">
      <aside id="filter-panel">
        <h3>Node Types</h3>
        <div id="type-filters"></div>
        <h3>Tags</h3>
        <div id="tag-filters"></div>
        <h3>Edge Class</h3>
        <div id="edge-filters">
          <label><input type="radio" name="edge-class" value="all" checked /> All</label>
          <label><input type="radio" name="edge-class" value="structural" /> Structural</label>
          <label><input type="radio" name="edge-class" value="behavioral" /> Behavioral</label>
          <label><input type="radio" name="edge-class" value="bridge" /> Bridge</label>
        </div>
      </aside>
      <div id="graph-container">
        <svg id="graph-svg"></svg>
        <div id="minimap"></div>
        <div id="legend"></div>
      </div>
      <aside id="detail-panel" class="hidden">
        <button id="detail-close">&#x2715;</button>
        <div id="detail-content"></div>
      </aside>
    </div>
    <div id="curator-drawer" class="curator-collapsed">
      <div class="curator-handle" title="Drag to resize"></div>
      <div class="curator-tabs">
        <button class="curator-tab active" data-tab="chat">Chat</button>
        <button class="curator-tab" data-tab="issues">Issues <span id="issues-badge" class="curator-badge" hidden>0</span></button>
      </div>
      <div class="curator-body">
        <div id="curator-chat" class="curator-panel active">
          <div id="chat-messages" class="chat-messages"></div>
        </div>
        <div id="curator-issues" class="curator-panel">
          <div id="issues-list" class="issues-list"></div>
        </div>
      </div>
      <div class="curator-input-bar">
        <div id="chat-context-hint" class="chat-hint"></div>
        <div class="chat-input-wrapper">
          <input type="text" id="chat-input" placeholder="Ask about your graph, or type / for commands..." autocomplete="off" />
          <button id="chat-send" class="chat-send-btn" title="Send">&rarr;</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
