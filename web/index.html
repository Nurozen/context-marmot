<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContextMarmot — Graph Explorer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">&#x1F9AB; ContextMarmot</h1>
        <select id="namespace-select"></select>
        <button id="refresh-btn" title="Refresh graph">&#x21BB;</button>
      </div>
      <div class="toolbar-center">
        <input type="text" id="search-input" placeholder="Search nodes… (press /)" />
      </div>
      <div class="toolbar-right">
        <label class="toggle"><input type="checkbox" id="heat-toggle" /> Heat</label>
        <label class="toggle"><input type="checkbox" id="superseded-toggle" /> Superseded</label>
      </div>
    </header>
    <div id="main-area">
      <aside id="filter-panel">
        <h3>Node Types</h3>
        <div id="type-filters"></div>
        <h3>Edge Class</h3>
        <div id="edge-filters">
          <label><input type="radio" name="edge-class" value="all" checked /> All</label>
          <label><input type="radio" name="edge-class" value="structural" /> Structural</label>
          <label><input type="radio" name="edge-class" value="behavioral" /> Behavioral</label>
        </div>
      </aside>
      <div id="graph-container">
        <svg id="graph-svg"></svg>
        <div id="minimap"></div>
        <div id="legend"></div>
      </div>
      <aside id="detail-panel" class="hidden">
        <button id="detail-close">&#x2715;</button>
        <div id="detail-content"></div>
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
